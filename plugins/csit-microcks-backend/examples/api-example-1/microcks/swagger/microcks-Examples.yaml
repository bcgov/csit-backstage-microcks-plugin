            "taxYear": 2024,
            "incomeData": {
              "netIncome": 52340.22,
              "totalIncome": 61200.00,
              "maritalStatus": "married",
              "spouseNetIncome": 12023423.34,
              "numberOfDependents": 1
            }
          }

    200_example_ac234287-d972-4d2e-9aef-ce7c02ef58f1:
      request:
        parameters:
          verificationId: ac234287-d972-4d2e-9aef-ce7c02ef58f1
      response:
        status: 200
        body: |
          {
            "verificationId": "ac234287-d972-4d2e-9aef-ce7c02ef58f1",
            "status": "verified",
            "taxYear": 2024,
            "incomeData": {
              "netIncome": 343977.22,
              "totalIncome": 375875.00,
              "maritalStatus": "single",
              "spouseNetIncome": null,
              "numberOfDependents": 0
            }
          }

    200_example_40dc7cb6-7179-4532-922e-8e307caecd34:
      request:
        parameters:
          verificationId: 40dc7cb6-7179-4532-922e-8e307caecd34
      response:
        status: 200
        body: |
          {
            "verificationId": "40dc7cb6-7179-4532-922e-8e307caecd34",
            "status": "verified",
            "taxYear": 2024,
            "incomeData": {
              "netIncome": 343977.22,
              "totalIncome": 375875.00,
              "maritalStatus": "single",
              "spouseNetIncome": null,
              "numberOfDependents": 0
            }
          }

    200_example_40dc7cb6-7179-4532-922e-8e307caecd34_pending:
      request:
        parameters:
          verificationId: 40dc7cb6-7179-4532-922e-8e307caecd34
      response:
        status: 200
        body: |
          {
            "verificationId": "40dc7cb6-7179-4532-922e-8e307caecd34",
            "status": "pending"
          }

    404_example_verification_id_not_found:
      request:
        parameters:
          verificationId: unknown-id   # fallback / non-matching value
      response:
        status: 404
        body: {}