openapi: 3.1.0
info:
  title: Mock BC MSP Tombstone Data Service API
  description: |
    Mock API simulating access to British Columbia Medical Services Plan (MSP) tombstone data (core beneficiary enrollment and coverage information).

    **Identification rules**:
    • Either `phn` (Personal Health Number) OR both `fullLegalName` + `birthDate` must be provided

    Consent is accepted based on partner attestation.
  version: 0.1.0

tags:
  - name: MSP Tombstone Data
    description: Endpoints for requesting MSP beneficiary tombstone data

paths:
  /msp-tombstone-data:
    post:
      summary: Request MSP tombstone data
      description: |
        Submits a request for MSP tombstone data (core enrollment and coverage information) for an individual who has provided consent.
        Returns the data if a matching beneficiary record is found.
        Consent is accepted on the basis of partner attestation.
      operationId: getMspTombstoneData
      tags:
        - MSP Tombstone Data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MspTombstoneDataRequest"
      responses:
        "200":
          description: Request successful - matching record found and tombstone data returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MspTombstoneDataResponse"
        "400":
          description: Validation error - request body is malformed, missing required fields, or contains invalid values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetailResponse"
        "404":
          description: No matching MSP beneficiary found
        "500":
          description: Internal server error - an unexpected error occurred while processing the request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    MspTombstoneDataRequest:
      type: object
      description: The payload required to request MSP tombstone data
      required:
        - partnerProgramId
        - consent
        - individual
      properties:
        partnerProgramId:
          type: string
          description: Unique identifier registered for the government program or department making the request
          example: BC_INCOME_ASSISTANCE
        consent:
          description: Attestation information about the consent obtained from the individual
          $ref: "#/components/schemas/ConsentInfo"
        individual:
          description: Identifying information for the individual whose MSP tombstone data is being requested
          $ref: "#/components/schemas/IndividualIdentity"
      example:
        partnerProgramId: BC_INCOME_ASSISTANCE
        consent:
          consentId: CONSENT-2026-000123
          consentTimestamp: "2026-01-16T18:22:00Z"
          consentMethod: electronic
        individual:
          phn: "1234567890"

    IndividualIdentity:
      type: object
      description: Identification details of the individual. Either PHN or fullLegalName + birthDate must be provided.
      oneOf:
        - required: [phn]
        - required: [fullLegalName, birthDate]
      properties:
        phn:
          type: string
          description: Personal Health Number (exactly 10 digits) - preferred and highest-confidence identification method
          pattern: "^\\d{10}$"
          example: "1234567890"
        fullLegalName:
          type: string
          description: Full legal name of the individual (required when PHN is not provided)
          example: Jane Elizabeth Doe
        birthDate:
          type: string
          format: date
          description: Date of birth in ISO 8601 format (YYYY-MM-DD) - required when identifying without PHN
          example: "1985-04-12"
      example:
        phn: "1234567890"

    ConsentInfo:
      type: object
      description: Information attesting to the individual's consent.
      required:
        - consentId
        - consentTimestamp
        - consentMethod
      properties:
        consentId:
          type: string
          description: Unique reference/ID generated by the partner for this specific consent event
          example: CONSENT-2026-000123
        consentTimestamp:
          type: string
          format: date-time
          description: UTC timestamp when the individual provided consent
          example: "2026-01-16T18:22:00Z"
        consentMethod:
          type: string
          description: Method by which consent was obtained
          enum:
            - electronic
            - paper
            - in_person
          example: electronic
      example:
        consentId: CONSENT-2026-000123
        consentTimestamp: "2026-01-16T18:22:00Z"
        consentMethod: electronic

    MspTombstoneDataResponse:
      type: object
      description: Response containing the requested MSP tombstone data
      required:
        - status
      properties:
        status:
          type: string
          description: Result status of the request
          enum: [success, no_match, error]
          example: success
        tombstoneData:
          description: Core MSP beneficiary tombstone information (present only when status is "success")
          $ref: "#/components/schemas/MspTombstoneData"
        errors:
          type: array
          description: Problem detail error items describing why the request failed (present only when status is "error")
          minItems: 1
          items:
            $ref: "#/components/schemas/ProblemDetailErrorItem"

    MspTombstoneData:
      type: object
      description: Core MSP beneficiary tombstone/enrollment information
      properties:
        phn:
          type: string
          description: Personal Health Number (10 digits)
          example: "1234567890"
        fullLegalName:
          type: string
          description: Full legal name as registered with MSP
          example: Jane Elizabeth Doe
        birthDate:
          type: string
          format: date
          example: "1985-04-12"
        mailingAddress:
          description: Current mailing address on file
          $ref: "#/components/schemas/Address"
        residentialAddress:
          description: Current residential/physical address on file
          $ref: "#/components/schemas/Address"
        coverageStatus:
          type: string
          enum: [Active, Inactive, Cancelled, Pending, Premium Assistance]
          example: Active
        coverageStartDate:
          type: string
          format: date
          example: "2010-01-01"
        coverageEndDate:
          type: [string, "null"]
          format: date
          example: null

    Address:
      type: object
      description: Structured address following BC Address Data Standards and Canada Post conventions.
      required:
        - streetNumber
        - streetName
        - city
      properties:
        unit:
          type: [string, "null"]
          example: "305"
        streetNumber:
          type: string
          example: "123"
        streetName:
          type: string
          example: Main
        streetType:
          type: [string, "null"]
          example: St
        direction:
          type: [string, "null"]
          example: SW
        city:
          type: string
          example: Victoria
        province:
          type: [string, "null"]
          example: BC
        country:
          type: string
          example: CA
        postalCode:
          type: [string, "null"]
          example: "V8V 1A1"

    ProblemDetailResponse:
      type: object
      description: Canonical model for problem details as defined by RFC-9457
      required:
        - type
        - title
        - status
        - errors
      properties:
        type:
          type: string
          example: tag:validation-errors
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        detail:
          type: [string, "null"]
          example: One or more validation errors occurred
        errors:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ProblemDetailErrorItem"

    ProblemDetailErrorItem:
      type: object
      description: Represents a single detailed error within a Problem Details response.
      required:
        - location
        - code
        - message
        - type
      properties:
        location:
          $ref: "#/components/schemas/ProblemDetailErrorLocation"
        code:
          type: string
          example: REQUIRED_FIELD_MISSING
        message:
          type: string
          example: Missing required identifier
        type:
          type: string
          example: tag:validation-error
        field:
          type: [string, "null"]
        detail:
          type: [string, "null"]
        received:
          type: [string, "null"]
        pointer:
          type: [string, "null"]
        constraints:
          type: [object, "null"]
          additionalProperties: true

    ProblemDetailErrorLocation:
      type: string
      enum:
        - body
        - query
        - header
        - path
        - cookie
      example: body

    ErrorResponse:
      type: object
      description: Standard error response format for unexpected or server-side errors.
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: forbidden
        message:
          type: string
          example: You are not authorized to access this resource
        details:
          type: [object, "null"]
          additionalProperties: true